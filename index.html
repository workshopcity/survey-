<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop City WA Survey</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background:#0f2f57; /* cleaner blue */
      margin:0;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .header {
      width:100%;
      text-align:center;
      padding:20px 10px 10px;
    }

    .logo img {
      max-width:220px;
      height:auto;
    }

    .container { 
      width:100%;
      max-width:420px; 
      margin:10px auto 30px; 
      background:white; 
      padding:20px; 
      border-radius:12px; 
      box-shadow:0 6px 20px rgba(0,0,0,0.3);
      box-sizing:border-box;
    }

    h2 { 
      text-align:center; 
      margin-top:0; 
      color:#0f2f57;
    }

    label { 
      display:block; 
      margin-top:15px; 
      font-weight:bold; 
      color:#0f2f57;
    }

    input, select, textarea {
      width:100%; 
      padding:12px; 
      margin-top:6px; 
      border-radius:8px; 
      border:1px solid #ccc;
      font-size:16px;
      box-sizing:border-box; /* FIX alignment issue */
    }

    input:focus, select:focus, textarea:focus {
      outline:none;
      border:1px solid #f58220;
      box-shadow:0 0 5px rgba(245,130,32,0.5);
    }

    button { 
      width:100%;
      padding:14px;
      background:#f58220; 
      color:white; 
      border:none; 
      cursor:pointer; 
      margin-top:20px;
      font-weight:bold;
      font-size:16px;
      border-radius:8px;
    }

    button:hover { background:#d96d12; }

    .success { 
      margin-top:15px; 
      color:green; 
      text-align:center; 
      font-weight:bold;
    }

    @media (max-width:600px) {
      .container {
        margin:10px;
        padding:15px;
      }

      .logo img {
        max-width:180px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
<img src="logo.png" alt="Workshop City WA Logo">
  </div>
</div>

<div class="container">
  <h2>Customer Feedback</h2>

  <form id="surveyForm">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter your name" required>

    <label>Registration Number</label>
    <input type="text" id="rego" placeholder="e.g. 1ABC123">

    <label>How would you rate our service?</label>
    <select id="rating" required>
      <option value="">Select rating</option>
      <option>Excellent</option>
      <option>Good</option>
      <option>Average</option>
      <option>Poor</option>
    </select>

    <label>Would you recommend Workshop City WA?</label>
    <select id="recommend">
      <option value="">Select option</option>
      <option>Yes</option>
      <option>No</option>
    </select>

    <label>Additional Comments</label>
    <textarea id="comments" placeholder="Tell us about your experience"></textarea>

    <button type="submit">Submit Feedback</button>
  </form>

  <div class="success" id="successMsg"></div>
</div>
<script>
const form = document.getElementById('surveyForm');
const successMsg = document.getElementById('successMsg');

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRiksR_3iUHRO1Y8wUJsqA7IfJWuKk7BjZbrZrwBA5gXO-cirdsvGFPbl9k5MF0K6Dzw/exec";

// Pre-fill from URL
const params = new URLSearchParams(window.location.search);
if(params.get('name')) document.getElementById('name').value = params.get('name');
if(params.get('rego')) document.getElementById('rego').value = params.get('rego');

form.addEventListener('submit', function(e) {
  e.preventDefault();

  const data = {
    name: document.getElementById('name').value,
    rego: document.getElementById('rego').value,
    rating: document.getElementById('rating').value,
    recommend: document.getElementById('recommend').value,
    comments: document.getElementById('comments').value,
    date: new Date().toLocaleString()
  };

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "application/json"
    }
  })
  .then(response => response.text()) // IMPORTANT FIX
  .then(() => {
    successMsg.textContent = "Thank you! Your feedback has been submitted.";
    form.reset();
  })
  .catch(error => {
    successMsg.textContent = "Error submitting form. Please try again.";
    console.error(error);
  });
});
</script>

</body>
</html>
