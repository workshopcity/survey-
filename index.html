<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop City WA Survey</title>

  <style>
    body { 
      font-family: Arial, sans-serif; 
      background:#0f2f57;
      margin:0;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .header {
      width:100%;
      text-align:center;
      padding:20px 10px 10px;
    }

    .logo img {
      max-width:220px;
      height:auto;
    }

    .container { 
      width:100%;
      max-width:420px; 
      margin:10px auto 30px; 
      background:white; 
      padding:20px; 
      border-radius:12px; 
      box-shadow:0 6px 20px rgba(0,0,0,0.3);
      box-sizing:border-box;
    }

    h2 { 
      text-align:center; 
      margin-top:0; 
      color:#0f2f57;
    }

    label { 
      display:block; 
      margin-top:15px; 
      font-weight:bold; 
      color:#0f2f57;
    }

    input, select, textarea {
      width:100%; 
      padding:12px; 
      margin-top:6px; 
      border-radius:8px; 
      border:1px solid #ccc;
      font-size:16px;
      box-sizing:border-box;
    }

    input:focus, select:focus, textarea:focus {
      outline:none;
      border:1px solid #f58220;
      box-shadow:0 0 5px rgba(245,130,32,0.5);
    }

    button { 
      width:100%;
      padding:14px;
      background:#f58220; 
      color:white; 
      border:none; 
      cursor:pointer; 
      margin-top:20px;
      font-weight:bold;
      font-size:16px;
      border-radius:8px;
    }

    button:hover { background:#d96d12; }

    .success { 
      margin-top:15px; 
      color:green; 
      text-align:center; 
      font-weight:bold;
    }

    @media (max-width:600px) {
      .container {
        margin:10px;
        padding:15px;
      }

      .logo img {
        max-width:180px;
      }
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="logo.png" alt="Workshop City WA Logo">
  </div>
</div>

<div class="container">
  <h2>Customer Feedback</h2>

  <form id="surveyForm"
        method="POST"
        action="https://script.google.com/macros/s/AKfycbwwIjOqno-QsKsBzgqr45NmaV41FNNcmVFs0k5Oi9ZjGbNN7t1mLk2BKuv_xg-UzOXlAw/exec"
        target="hidden_iframe">

    <label>Full Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your name" required>

    <label>Registration Number</label>
    <input type="text" id="rego" name="rego" placeholder="e.g. 1ABC123">

    <label>How would you rate our service?</label>
    <select id="rating" name="rating" required>
      <option value="">Select rating</option>
      <option>Excellent</option>
      <option>Good</option>
      <option>Average</option>
      <option>Poor</option>
    </select>

    <label>Would you recommend Workshop City WA?</label>
    <select id="recommend" name="recommend">
      <option value="">Select option</option>
      <option>Yes</option>
      <option>No</option>
    </select>

    <label>Additional Comments</label>
    <textarea id="comments" name="comments" placeholder="Tell us about your experience"></textarea>

    <!-- Hidden date -->
    <input type="hidden" name="date" id="date">

    <button type="submit">Submit Feedback</button>
  </form>

  <div class="success" id="successMsg"></div>
</div>

<!-- Hidden iframe (prevents page redirect) -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
const form = document.getElementById('surveyForm');
const successMsg = document.getElementById('successMsg');

// Pre-fill from URL
const params = new URLSearchParams(window.location.search);
if(params.get('name')) document.getElementById('name').value = params.get('name');
if(params.get('rego')) document.getElementById('rego').value = params.get('rego');

// Submit handler
form.addEventListener('submit', function() {
  document.getElementById('date').value = new Date().toLocaleString();

  successMsg.textContent = "Thank you! Your feedback has been submitted.";

  setTimeout(() => {
    form.reset();
  }, 800);
});
</script>

</body>
</html>
